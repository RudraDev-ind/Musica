<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musica</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #00d2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background: #050505;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* --- Liquid Background --- */
        .liquid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            filter: blur(80px);
            background: radial-gradient(circle at 20% 30%, #3a0088 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #00d2ff 0%, transparent 40%);
            animation: drift 15s infinite alternate ease-in-out;
        }

        @keyframes drift {
            from { transform: scale(1); }
            to { transform: scale(1.2) rotate(5deg); }
        }

        /* --- Main App Shell --- */
        .app-shell {
            width: 95%;
            max-width: 420px;
            height: 90vh;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* --- Sections Logic --- */
        .content-area { flex: 1; padding: 25px; overflow-y: auto; position: relative; }
        
        .page-content {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .page-content.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* --- UI Elements --- */
        .header { margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; text-align: center; }
        .genre-pill { background: white; color: black; padding: 5px 15px; border-radius: 20px; margin-right: 8px; font-size: 0.8rem; display: inline-block; }

        /* --- Bottom Navigation --- */
        .nav-bar {
            height: 80px;
            background: rgba(255,255,255,0.03);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--glass-border);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .nav-item { cursor: pointer; font-size: 1.5rem; opacity: 0.5; transition: 0.3s; }
        .nav-item.active { opacity: 1; transform: scale(1.2); color: var(--accent); }

    </style>
</head>
<body>

    <div class="liquid-bg"></div>

    <div class="app-shell">
        <div class="content-area">
            
            <section id="trending" class="page-content">
                <div class="header"><h1>Trending</h1></div>
                <div class="tabs"><b>India</b> | Worldwide</div>
                <div class="grid">
                    <div class="card" onclick="Musica.play('dQw4w9WgXcQ', 'Never Gonna Give You Up', 'Rick Astley', '')">Song 1</div>
                    <div class="card">Song 2</div>
                </div>
            </section>

            <section id="home" class="page-content active">
                <div class="header"><h1>For You</h1></div>
                <div class="genres">
                    <span class="genre-pill">Pop</span><span class="genre-pill">Lo-Fi</span>
                </div>
                <h3 style="margin-top:20px">Quick Picks</h3>
                <div class="grid">
                    <div class="card">Recently Played</div>
                    <div class="card">Lofi Beats</div>
                </div>
            </section>

            <section id="library" class="page-content">
                <div class="header"><h1>Library</h1></div>
                <div class="card">❤️ Liked Songs</div>
                <div class="card" style="margin-top:10px">+ Create Playlist</div>
            </section>

            <section id="profile" class="page-content">
                <div class="header"><h1>Profile</h1></div>
                <div class="card">Login with Email</div>
                <p style="text-align:center; margin-top:20px; opacity:0.6">Settings | About Musica</p>
            </section>

        </div>

        <nav class="nav-bar">
            <div class="nav-item" onclick="Musica.showPage('trending', this)">🔥</div>
            <div class="nav-item active" onclick="Musica.showPage('home', this)">🏠</div>
            <div class="nav-item" onclick="Musica.showPage('library', this)">📚</div>
            <div class="nav-item" onclick="Musica.showPage('profile', this)">👤</div>
        </nav>
    </div>

    <script>
        const Musica = {
            audio: new Audio(),

            init() {
                this.setupMediaSession();
                console.log("Musica Engine Started");
            },

            showPage(pageId, navEl) {
                // Update Nav UI
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                navEl.classList.add('active');

                // Update Sections
                const pages = document.querySelectorAll('.page-content');
                pages.forEach(p => {
                    p.classList.remove('active');
                    if(p.id === pageId) {
                        setTimeout(() => p.classList.add('active'), 50);
                    }
                });
            },

            async play(videoId, title, artist, cover) {
                try {
                    // Using Piped API for direct audio streaming
                    const res = await fetch(`https://pipedapi.kavin.rocks/streams/${videoId}`);
                    const data = await res.json();
                    const stream = data.audioStreams.find(s => s.format === 'M4A');

                    if (stream) {
                        this.audio.src = stream.url;
                        this.audio.play();
                        this.updateMetadata(title, artist, cover);
                    }
                } catch (e) { alert("Playback error"); }
            },

            updateMetadata(title, artist, cover) {
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: title,
                        artist: artist,
                        artwork: [{ src: cover || 'https://via.placeholder.com/512', sizes: '512x512', type: 'image/png' }]
                    });
                }
            },

            setupMediaSession() {
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.setActionHandler('play', () => this.audio.play());
                    navigator.mediaSession.setActionHandler('pause', () => this.audio.pause());
                }
            }
        };

        window.onload = () => Musica.init();
    </script>
</body>
</html>
