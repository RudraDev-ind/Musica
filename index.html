<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musica | Ad-Free Streaming</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #00d2ff;
            --bg-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-dark);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Liquid Background Animation --- */
        .liquid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            filter: blur(60px);
            background: radial-gradient(circle at 10% 20%, #3a0088 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, #00d2ff 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, #121212 0%, transparent 70%);
            animation: liquidMove 15s infinite alternate ease-in-out;
        }

        @keyframes liquidMove {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(20px, 30px); }
        }

        /* --- App Container --- */
        .app-shell {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-left: 1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- Content Sections --- */
        .content-area { flex: 1; padding: 25px; overflow-y: auto; position: relative; padding-bottom: 160px; }
        
        .page-section {
            display: none;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .page-section.active {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        h1 { font-size: 2rem; margin-bottom: 20px; font-weight: 800; letter-spacing: -1px; }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .card:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }

        /* --- Mini Player Pill --- */
        .mini-player {
            position: absolute;
            bottom: 95px;
            left: 5%;
            width: 90%;
            height: 65px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            transform: translateY(200%);
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 50;
        }

        .mini-player.visible { transform: translateY(0); }

        .mini-info { display: flex; align-items: center; gap: 12px; }
        .mini-art { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); animation: rotate 5s linear infinite; animation-play-state: paused; }
        .mini-player.playing .mini-art { animation-play-state: running; }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- Full Player Overlay --- */
        .full-player {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.98);
            backdrop-filter: blur(40px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 40px 30px;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .full-player.open { transform: translateY(0); }

        .full-art {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 30px;
            background: linear-gradient(45deg, #3a0088, #00d2ff);
            margin: 40px 0;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .full-controls { display: flex; justify-content: center; align-items: center; gap: 40px; margin-top: auto; }
        .play-big { width: 85px; height: 85px; background: white; color: black; border-radius: 50%; border: none; font-size: 2rem; }

        /* --- Bottom Nav --- */
        .nav-bar {
            height: 85px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid var(--glass-border);
            z-index: 40;
        }

        .nav-item { font-size: 1.4rem; opacity: 0.4; transition: 0.3s; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--accent); transform: scale(1.1); }

    </style>
</head>
<body>

    <div class="liquid-bg"></div>

    <div class="app-shell">
        <div class="content-area">
            
            <section id="trending" class="page-section">
                <h1>Trending</h1>
                <p style="margin-bottom: 20px; opacity: 0.6;">India | Worldwide</p>
                <div class="card" onclick="Musica.play('dQw4w9WgXcQ', 'Never Gonna Give You Up', 'Rick Astley')">
                    <h3>Trending Hit #1</h3>
                    <p>Rick Astley</p>
                </div>
            </section>

            <section id="home" class="page-section active">
                <h1>Musica</h1>
                <div class="card" onclick="Musica.play('jfKfPfyJRdk', 'Lofi Girl', 'ChilledCow')">
                    <h3>Lofi Beats</h3>
                    <p>Quick Pick from History</p>
                </div>
                <h3>Genres</h3>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <div class="card" style="flex:1">Pop</div>
                    <div class="card" style="flex:1">Jazz</div>
                </div>
            </section>

            <section id="library" class="page-section">
                <h1>Your Library</h1>
                <div class="card">❤️ Liked Songs</div>
                <div class="card">📁 Custom Playlist 1</div>
            </section>

            <section id="profile" class="page-section">
                <h1>Profile</h1>
                <div class="card">Sign in with Email</div>
                <div class="card" style="background: transparent;">Settings</div>
            </section>

        </div>

        <div id="mini-player" class="mini-player" onclick="Musica.toggleFull(true)">
            <div class="mini-info">
                <div class="mini-art"></div>
                <div>
                    <b id="m-title" style="font-size:0.9rem; display:block;">Not Playing</b>
                    <small id="m-artist" style="opacity:0.6">Choose a song</small>
                </div>
            </div>
            <button onclick="event.stopPropagation(); Musica.togglePlay();" style="background:none; border:none; color:white; font-size:1.5rem;">▶</button>
        </div>

        <nav class="nav-bar">
            <div class="nav-item" onclick="Musica.nav('trending', this)">🔥</div>
            <div class="nav-item active" onclick="Musica.nav('home', this)">🏠</div>
            <div class="nav-item" onclick="Musica.nav('library', this)">📚</div>
            <div class="nav-item" onclick="Musica.nav('profile', this)">👤</div>
        </nav>

        <div id="full-overlay" class="full-player">
            <canvas id="visualizer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4;"></canvas>
            <button onclick="Musica.toggleFull(false)" style="align-self:flex-start; background:none; border:none; color:white; font-size:1.5rem;">✕</button>
            <div class="full-art"></div>
            <div style="text-align:center">
                <h1 id="f-title" style="margin:0">Song Title</h1>
                <p id="f-artist" style="opacity:0.6">Artist Name</p>
            </div>
            <div class="full-controls">
                <button style="background:none; border:none; color:white; font-size:2rem;">⏮</button>
                <button class="play-big" onclick="Musica.togglePlay()">▶</button>
                <button style="background:none; border:none; color:white; font-size:2rem;">⏭</button>
            </div>
        </div>
    </div>

    <script>
        const Musica = {
            audio: new Audio(),
            isPlaying: false,

            init() {
                this.audio.addEventListener('ended', () => this.next());
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.setActionHandler('play', () => this.togglePlay());
                    navigator.mediaSession.setActionHandler('pause', () => this.togglePlay());
                }
            },

            nav(pageId, el) {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
                
                document.querySelectorAll('.page-section').forEach(s => {
                    s.classList.remove('active');
                    if(s.id === pageId) setTimeout(() => s.classList.add('active'), 50);
                });
            },

            async play(id, title, artist) {
                const mini = document.getElementById('mini-player');
                mini.classList.add('visible');
                
                document.getElementById('m-title').innerText = title;
                document.getElementById('m-artist').innerText = artist;
                document.getElementById('f-title').innerText = title;
                document.getElementById('f-artist').innerText = artist;

                try {
                    // Ad-free streaming proxy
                    const res = await fetch(`https://pipedapi.kavin.rocks/streams/${id}`);
                    const data = await res.json();
                    const stream = data.audioStreams.find(s => s.format === 'M4A');
                    
                    this.audio.src = stream.url;
                    this.audio.play();
                    this.isPlaying = true;
                    this.updateUI();
                    
                    if ('mediaSession' in navigator) {
                        navigator.mediaSession.metadata = new MediaMetadata({ title, artist });
                    }
                } catch (e) { alert("Stream currently unavailable."); }
            },

            togglePlay() {
                if(this.audio.paused) { this.audio.play(); this.isPlaying = true; }
                else { this.audio.pause(); this.isPlaying = false; }
                this.updateUI();
            },

            updateUI() {
                const btns = [document.querySelector('.mini-player button'), document.querySelector('.play-big')];
                btns.forEach(b => b.innerText = this.isPlaying ? '⏸' : '▶');
                document.getElementById('mini-player').classList.toggle('playing', this.isPlaying);
            },

            toggleFull(open) {
                document.getElementById('full-overlay').classList.toggle('open', open);
            }
        };

        window.onload = () => Musica.init();
    <script src="app.js"></script>
</body>
</html>
