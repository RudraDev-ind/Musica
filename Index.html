<div class="app-shell">
    <div class="liquid-blob blob-1"></div>
    <div class="liquid-blob blob-2"></div>

    <main class="glass-viewport">
        
        <section id="trending" class="page-content active">
            <div class="tabs">
                <span>India</span>
                <span>Worldwide</span>
            </div>
            </section>

        <section id="home" class="page-content">
            <div class="genre-scroll">
                <span>Pop</span> <span>Lo-Fi</span> <span>Rock</span>
            </div>

            </section>

        <section id="library" class="page-content">
            <h3>My Playlists</h3>
            <div class="add-playlist">+ Create New</div>

        <section id="profile" class="page-content">
            <div class="profile-header">
                <div class="avatar"></div>
                <button>Login / Sign Up</button>
            </div>
        </section>

    </main>

    <nav class="glass-nav">
        <div onclick="showPage('trending')">🔥</div>
        <div onclick="showPage('home')">🏠</div>
        <div onclick="showPage('library')">📚</div>
        <div onclick="showPage('profile')">👤</div>
    </nav>
</div>
